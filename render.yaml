services:
  - type: web
    name: bts-ticket-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CHECK_INTERVAL_SECONDS
        value: "60"
      - key: RE_ALERT_MINUTES
        value: "10"
      - key: TICKETMASTER_URL
        value: "https://www.ticketmaster.co/event/bts-world-tour-2026"
      - key: PYTHON_VERSION
        value: "3.11.9"
